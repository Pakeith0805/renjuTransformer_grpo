# config/config_grpo.yaml
defaults:
  - data: default
  - model: transformer
  - train: default
  - optimizer: adamw
  - scheduler: none
  - mlflow: local
  - _self_

mode: train_grpo
seed: 42

# GRPO 固有の設定グループ
grpo:
  checkpoint_path: models/pretrained.pt
  ref_checkpoint_path: models/pretrained.pt
  group_size: 16         # 1局面あたりにサンプリングする手の数 (G)
  beta: 0.04            # KLペナルティの強さの係数
  clip_eps: 0.2 
  temperature: 1.0      # サンプリング時の温度
  epochs: 5             # 強化学習の総エポック数 (テスト用)
  trajectory_sample_prob: 0.8
  mcts_simulations: 200
  use_tss_collection: false    # Trajectory collection TSS flag
  use_tss_training: false      # GRPO training rollout TSS flag
  use_puct_collection: false   # Trajectory collection PUCT flag (false = UCB1)
  use_puct_training: false     # GRPO training rollout PUCT flag (false = UCB1)
  use_length_penalty: false    # 決着までの手数に応じたペナルティの適用フラグ
  length_penalty_coef: 0.02    # ペナルティ係数 (手数ごとに引く値)
  use_full_game_training: false  # 1戦通して盤面を収集し、全盤面を1回ずつ学習するモード
  collection_simulations: 1000   # trajectory収集時のMCTSシミュレーション回数
  save_every: null               # チェックポイント保存の間隔 (nullの場合はモードに応じて自動設定)
  max_plies: 80                  # 自己対戦データ収集時の最大手数制限
  vcf_target_prob: 0.4           # 自己対戦ロールアウト収集時のVCF手の目標サンプリング確率
  dirichlet_alpha: 0.3           # Dirichletノイズの集中度 (小さいほど一様に近い探索)
  dirichlet_weight: 0.25         # ノイズの混合比率 (0.0 で無効化)
  skip_collapsed_steps: true     # advantage消滅ステップで optimizer.step をスキップ
  use_topk_weighted: false       # true: ノイズ→top-K(π̃)列挙→π重み和（期待値版GRPO） / false: 従来のMCサンプリング
  use_value_judge: false         # true: 報酬を MCTSロールアウトでなく value net(一括GPU評価)+TSS上書きで出す(v1)
  value_judge_path: models/pretrained_value.pt  # use_value_judge=true 時に使う value ヘッド付き checkpoint
  value_cotrain: false           # true: GRPO中に value net を自己対戦勝敗で継続学習(凍結の陳腐化を防ぐ, v1.5)。use_value_judge & use_full_game_training 前提
  value_cotrain_lr: 0.0001       # value 共進化の学習率
  value_cotrain_steps: 4         # 1iterあたりの value 更新ステップ数
  value_cotrain_batch: 256       # value 更新のバッチサイズ
  value_cotrain_every: 1         # 何iter毎に value を更新するか
  value_buffer_size: 20000       # value 教師(局面,勝敗)のリプレイバッファ上限